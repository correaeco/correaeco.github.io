<!DOCTYPE HTML>
<html>
	<head>
		<title>{{ page.title }} | Correa Eco Consulting</title>
		<meta http-equiv="content-type" content="text/html; charset=utf-8" />
		<meta name="description" content="Spatial planning, ecosystem restoration, and environmental strategy consulting." />
		<meta name="keywords" content="GIS, spatial planning, ecosystem restoration, biodiversity, climate strategy, environmental consulting" />

		<script src="{{ site.baseurl }}/assets/js/jquery.min.js"></script>
		<script src="{{ site.baseurl }}/assets/js/jquery.dropotron.min.js"></script>
		<script src="{{ site.baseurl }}/assets/js/skel.min.js"></script>
		<script src="{{ site.baseurl }}/assets/js/skel-layers.min.js"></script>
		<script src="{{ site.baseurl }}/assets/js/init.js"></script>

		<noscript>
			<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/skel.css" />
			<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css" />
			<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style-wide.css" />
		</noscript>
	</head>

	<body>

		<!-- Header -->
		<div id="header">

			<!-- Logo -->
			<h1>
				<a href="{{ site.baseurl }}/" id="logo">
					Correa Eco Consulting
				</a>
			</h1>

			<!-- Navigation -->
			<nav id="nav">
				<ul>
					{% assign current = page.url | downcase | split: '/' %}

					<li {% if page.url == '/' %}class="current"{% endif %}>
						<a href="{{ site.baseurl }}/">Home</a>
					</li>

					<li {% if current[1] == 'services' %}class="current"{% endif %}>
						<a href="{{ site.baseurl }}/services/">Services</a>
					</li>

					<li {% if current[1] == 'projects' %}class="current"{% endif %}>
						<a href="{{ site.baseurl }}/projects/">Projects</a>
					</li>

					<li {% if current[1] == 'about' %}class="current"{% endif %}>
						<a href="{{ site.baseurl }}/about/">About</a>
					</li>

					<li {% if current[1] == 'contact' %}class="current"{% endif %}>
						<a href="{{ site.baseurl }}/contact/">Contact</a>
					</li>

				</ul>
			</nav>

		</div>
